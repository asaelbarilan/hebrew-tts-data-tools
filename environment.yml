name: tts-data-tools
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - ffmpeg
  - pip:
      - -r requirements.txt
      - --index-url https://download.pytorch.org/whl/cu121
      - torch
      - torchvision
      - torchaudio
      - --extra-index-url https://pypi.org/simple
      - torchcodec
